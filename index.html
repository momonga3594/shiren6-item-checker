<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>風来のシレン6 識別ツール</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  :root {
    --bg: #1a1a2e;
    --bg2: #16213e;
    --bg3: #0f3460;
    --accent: #e94560;
    --accent2: #f5a623;
    --text: #eaeaea;
    --text2: #a0a0b0;
    --green: #4caf50;
    --gray: #555;
    --card: #1e2a45;
    --border: #2a3a5e;
    --blue: #4fc3f7;
    --teal: #26c6da;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Hiragino Kaku Gothic Pro', 'Meiryo', sans-serif; font-size: 14px; }

  header {
    background: var(--bg3);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 2px solid var(--accent);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  header h1 { font-size: 16px; color: var(--accent2); letter-spacing: 1px; }
  header .subtitle { font-size: 11px; color: var(--text2); margin-top: 2px; }

  .btn-reset {
    background: var(--accent);
    color: white;
    border: none;
    padding: 6px 14px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 12px;
    font-family: inherit;
  }
  .btn-reset:hover { opacity: 0.85; }

  .btn-qr {
    background: none;
    color: var(--accent2);
    border: 1px solid var(--accent2);
    padding: 6px 12px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 12px;
    font-family: inherit;
  }
  .btn-qr:hover { background: rgba(245,166,35,0.12); }

  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 24px;
    text-align: center;
    min-width: 220px;
  }
  .modal h2 { font-size: 14px; color: var(--accent2); margin-bottom: 16px; }
  .modal p { font-size: 11px; color: var(--text2); margin-top: 12px; word-break: break-all; }
  #qrcode { display: flex; justify-content: center; }
  #qrcode canvas, #qrcode img { border-radius: 6px; }
  .modal-close {
    margin-top: 16px;
    background: none;
    border: 1px solid var(--border);
    color: var(--text2);
    padding: 6px 20px;
    border-radius: 4px;
    cursor: pointer;
    font-family: inherit;
    font-size: 12px;
  }
  .modal-close:hover { border-color: var(--text); color: var(--text); }

  .filter-bar {
    background: var(--bg2);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .filter-bar label { font-size: 12px; color: var(--text2); white-space: nowrap; }
  .filter-bar input {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 5px 10px;
    border-radius: 4px;
    width: 100px;
    font-size: 13px;
    font-family: inherit;
  }
  .filter-bar input:focus { outline: none; border-color: var(--accent2); }
  .filter-count { font-size: 12px; color: var(--accent2); }
  .filter-clear { background: none; border: 1px solid var(--border); color: var(--text2); padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 11px; font-family: inherit; }
  .filter-clear:hover { border-color: var(--accent2); color: var(--accent2); }

  .chip-bar {
    background: var(--bg2);
    padding: 6px 16px 10px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    border-bottom: 1px solid var(--border);
  }
  .chip-row { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
  .chip-label { font-size: 11px; color: var(--text2); min-width: 36px; white-space: nowrap; }
  .price-chip {
    display: inline-flex;
    align-items: center;
    padding: 4px 11px;
    border-radius: 14px;
    border: 1px solid var(--border);
    background: var(--card);
    cursor: pointer;
    font-size: 12px;
    color: var(--text2);
    user-select: none;
    transition: all 0.15s;
  }
  .price-chip:hover { border-color: var(--accent2); color: var(--text); }
  .price-chip.active.buy  { border-color: var(--accent2); background: rgba(245,166,35,0.18); color: var(--accent2); font-weight: bold; }
  .price-chip.active.sell { border-color: var(--blue); background: rgba(79,195,247,0.14); color: var(--blue); font-weight: bold; }
  .price-chip.active.count { border-color: var(--teal); background: rgba(38,198,218,0.18); color: var(--teal); font-weight: bold; }

  .tabs {
    display: flex;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
  }
  .tab {
    padding: 10px 20px;
    cursor: pointer;
    font-size: 13px;
    white-space: nowrap;
    color: var(--text2);
    border-bottom: 3px solid transparent;
    transition: color 0.15s;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent2); border-bottom-color: var(--accent2); }
  .tab .badge {
    display: inline-block;
    margin-left: 6px;
    background: var(--bg3);
    border-radius: 10px;
    padding: 1px 6px;
    font-size: 10px;
    color: var(--text2);
  }
  .tab.active .badge { background: var(--accent2); color: #000; }

  .content { padding: 8px 12px; max-width: 900px; margin: 0 auto; }

  .section-header {
    display: grid;
    grid-template-columns: 1fr 130px 40px;
    gap: 8px;
    padding: 6px 10px;
    font-size: 11px;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    border-bottom: 1px solid var(--border);
    margin-top: 4px;
  }

  .item-list { display: flex; flex-direction: column; gap: 4px; padding-top: 4px; }

  .item-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 10px;
    display: grid;
    grid-template-columns: 1fr 130px 40px;
    gap: 8px;
    align-items: center;
    transition: opacity 0.2s, border-color 0.2s;
  }
  .item-card.identified {
    opacity: 0.5;
    border-color: var(--green);
    background: rgba(76,175,80,0.05);
  }
  .item-card.absent {
    opacity: 0.35;
    border-color: var(--gray);
  }
  .item-card.highlighted {
    border-color: var(--accent2);
    background: rgba(245,166,35,0.08);
  }

  .target-badge {
    display: inline-block;
    margin-left: 6px;
    padding: 1px 6px;
    border-radius: 4px;
    font-size: 10px;
    font-weight: bold;
    background: #7c3aed;
    color: #e9d5ff;
    border: 1px solid #a855f7;
    vertical-align: middle;
    letter-spacing: 0.3px;
  }

  .item-info { min-width: 0; }
  .item-name {
    font-size: 13px;
    font-weight: bold;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .item-card.identified .item-name { text-decoration: line-through; color: var(--text2); }
  .item-effect { font-size: 11px; color: var(--text2); margin-top: 2px; line-height: 1.4; }
  .item-counts { margin-top: 4px; display: flex; flex-wrap: wrap; gap: 3px; }
  .count-badge {
    display: inline-block;
    padding: 1px 7px;
    border-radius: 10px;
    font-size: 10px;
    border: 1px solid var(--border);
    color: var(--text2);
  }
  .count-badge.match { border-color: var(--teal); color: var(--teal); background: rgba(38,198,218,0.12); font-weight: bold; }

  .item-price { font-size: 12px; text-align: right; }
  .price-buy { color: var(--accent2); }
  .price-sell { color: var(--text2); font-size: 11px; }
  .price-range { color: var(--text2); font-size: 11px; }

  .item-status-col { display: flex; align-items: center; justify-content: center; }

  .status-btn {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    transition: all 0.15s;
    position: relative;
  }
  .status-btn:hover { border-color: var(--text); }
  .status-btn.s-unknown { border-color: var(--border); color: var(--text2); }
  .status-btn.s-identified { border-color: var(--green); background: rgba(76,175,80,0.15); color: var(--green); }
  .status-btn.s-absent { border-color: var(--gray); background: rgba(85,85,85,0.15); color: var(--gray); }

  .status-btn .tooltip {
    display: none;
    position: absolute;
    bottom: 38px;
    right: 0;
    background: #333;
    color: white;
    padding: 3px 8px;
    border-radius: 4px;
    font-size: 10px;
    white-space: nowrap;
    pointer-events: none;
  }
  .status-btn:hover .tooltip { display: block; }

  .legend {
    display: flex;
    gap: 16px;
    padding: 10px 0 6px;
    flex-wrap: wrap;
  }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text2); }
  .legend-dot { width: 12px; height: 12px; border-radius: 50%; border: 2px solid; }

  .stats-bar {
    display: flex;
    gap: 12px;
    padding: 6px 0 10px;
    font-size: 11px;
    color: var(--text2);
    flex-wrap: wrap;
  }
  .stat { display: flex; align-items: center; gap: 4px; }
  .stat-val { font-weight: bold; font-size: 13px; }
  .stat-val.green { color: var(--green); }
  .stat-val.gray { color: var(--text2); }
  .stat-val.accent { color: var(--accent2); }

  .no-results { text-align: center; padding: 40px; color: var(--text2); font-size: 13px; }

  @media (max-width: 500px) {
    .item-card { grid-template-columns: 1fr 110px 36px; }
    .section-header { grid-template-columns: 1fr 110px 36px; }
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>⚔ 風来のシレン6 識別ツール</h1>
    <div class="subtitle">巻物・杖・壺・腕輪の識別管理</div>
  </div>
  <div style="display:flex;gap:8px;align-items:center">
    <button class="btn-qr" onclick="showQR()">QR</button>
    <button class="btn-reset" onclick="resetRun()">🔄 リセット</button>
  </div>
</header>

<div class="modal-overlay" id="qrModal" onclick="if(event.target===this)closeQR()">
  <div class="modal">
    <h2>QRコード</h2>
    <div id="qrcode"></div>
    <p id="qrUrl"></p>
    <button class="modal-close" onclick="closeQR()">閉じる</button>
  </div>
</div>

<div class="filter-bar">
  <label>買値で絞り込み:</label>
  <input type="number" id="priceFilter" placeholder="例: 1000" oninput="applyFilterInput()" />
  <button class="filter-clear" onclick="clearFilter()">クリア</button>
  <span class="filter-count" id="filterCount"></span>
</div>
<div class="chip-bar" id="chipBar">
  <div class="chip-row" id="chipRowCount" style="display:none"><span class="chip-label">回数:</span></div>
  <div class="chip-row" id="chipRowBuy"><span class="chip-label">買値:</span></div>
  <div class="chip-row" id="chipRowSell"><span class="chip-label">売値:</span></div>
</div>

<div class="tabs" id="tabs">
  <div class="tab active" onclick="switchTab('scroll')" id="tab-scroll">巻物 <span class="badge" id="badge-scroll">0/0</span></div>
  <div class="tab" onclick="switchTab('staff')" id="tab-staff">杖 <span class="badge" id="badge-staff">0/0</span></div>
  <div class="tab" onclick="switchTab('pot')" id="tab-pot">壺 <span class="badge" id="badge-pot">0/0</span></div>
  <div class="tab" onclick="switchTab('bracelet')" id="tab-bracelet">腕輪 <span class="badge" id="badge-bracelet">0/0</span></div>
  <div class="tab" onclick="switchTab('herb')" id="tab-herb">草 <span class="badge" id="badge-herb">0/0</span></div>
</div>

<div class="content">
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="border-color:#555"></div>未識別</div>
    <div class="legend-item"><div class="legend-dot" style="border-color:#4caf50"></div>識別済み</div>
    <div class="legend-item"><div class="legend-dot" style="border-color:#555; opacity:0.4"></div>なし（今回の冒険にない）</div>
  </div>
  <div class="stats-bar" id="statsBar"></div>
  <div class="section-header">
    <div>名前 / 効果</div>
    <div style="text-align:right">買値 / 売値</div>
    <div></div>
  </div>
  <div class="item-list" id="itemList"></div>
  <div class="no-results" id="noResults" style="display:none">一致するアイテムが見つかりません</div>
</div>

// Price helpers for count-based items
function getBuy(item, count) {
  if (!item.counts) return item.buy;
  return item.baseBuy + (count - item.counts[0]) * 100;
}
function getSell(item, count) {
  if (!item.counts) return item.sell;
  return Math.floor(getBuy(item, count) / 2.5);
}
function getMinBuy(item) { return item.counts ? item.baseBuy : item.buy; }
function getMaxBuy(item) {
  if (!item.counts) return item.buy;
  return item.baseBuy + (item.counts[item.counts.length - 1] - item.counts[0]) * 100;
}

// State
let state = loadState();
let currentTab = 'scroll';
let priceFilter = null;
let selectedPrices = new Set();
let selectedSellPrices = new Set();
let countFilter = null;

function loadState() {
  const defaults = { scroll: {}, staff: {}, pot: {}, bracelet: {}, herb: {} };
  try {
    const saved = localStorage.getItem('shiren6-id-state');
    if (saved) return Object.assign(defaults, JSON.parse(saved));
  } catch(e) {}
  return defaults;
}
function saveState() { localStorage.setItem('shiren6-id-state', JSON.stringify(state)); }

function getStatus(cat, name) { return state[cat][name] || 'unknown'; }

function cycleStatus(cat, name) {
  const cur = getStatus(cat, name);
  state[cat][name] = cur === 'unknown' ? 'identified' : cur === 'identified' ? 'absent' : 'unknown';
  saveState();
  render();
}

function resetRun() {
  if (!confirm('今回の冒険の識別状態をリセットしますか？')) return;
  state = { scroll: {}, staff: {}, pot: {}, bracelet: {} };
  saveState();
  render();
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  selectedPrices.clear();
  selectedSellPrices.clear();
  countFilter = null;
  renderChips();
  render();
}

function applyFilterInput() {
  const val = document.getElementById('priceFilter').value.trim();
  priceFilter = val === '' ? null : parseInt(val, 10);
  if (priceFilter !== null) { selectedPrices.clear(); selectedSellPrices.clear(); }
  renderChips();
  render();
}

function toggleChip(price, type) {
  document.getElementById('priceFilter').value = '';
  priceFilter = null;
  const set = type === 'sell' ? selectedSellPrices : selectedPrices;
  if (set.has(price)) { set.delete(price); } else { set.add(price); }
  renderChips();
  render();
}

function toggleCount(c) {
  countFilter = countFilter === c ? null : c;
  document.getElementById('priceFilter').value = '';
  priceFilter = null;
  selectedPrices.clear();
  selectedSellPrices.clear();
  renderChips();
  render();
}

function clearFilter() {
  document.getElementById('priceFilter').value = '';
  priceFilter = null;
  selectedPrices.clear();
  selectedSellPrices.clear();
  countFilter = null;
  renderChips();
  render();
}

function hasCountItems() { return currentTab === 'staff' || currentTab === 'pot'; }

function renderChips() {
  const items = ITEMS[currentTab];

  // Count chips (staff/pot only)
  const countRow = document.getElementById('chipRowCount');
  if (hasCountItems()) {
    const allCounts = new Set();
    items.forEach(it => it.counts && it.counts.forEach(c => allCounts.add(c)));
    const counts = [...allCounts].sort((a, b) => a - b);
    const unit = currentTab === 'staff' ? '回' : '個';
    countRow.style.display = 'flex';
    countRow.innerHTML = '<span class="chip-label">回数:</span>' +
      counts.map(c =>
        `<span class="price-chip count${countFilter === c ? ' active count' : ''}" onclick="toggleCount(${c})">${c}${unit}</span>`
      ).join('');
  } else {
    countRow.style.display = 'none';
  }

  // Determine effective price lists based on countFilter
  let buyPricesSet = new Set();
  let sellPricesSet = new Set();
  items.forEach(it => {
    if (it.counts) {
      const relevantCounts = countFilter ? it.counts.filter(c => c === countFilter) : it.counts;
      relevantCounts.forEach(c => {
        buyPricesSet.add(getBuy(it, c));
        sellPricesSet.add(getSell(it, c));
      });
    } else {
      buyPricesSet.add(it.buy);
      sellPricesSet.add(it.sell);
    }
  });
  const buyPrices  = [...buyPricesSet].sort((a, b) => a - b);
  const sellPrices = [...sellPricesSet].sort((a, b) => a - b);

  document.getElementById('chipRowBuy').innerHTML =
    '<span class="chip-label">買値:</span>' +
    buyPrices.map(p =>
      `<span class="price-chip buy${selectedPrices.has(p) ? ' active buy' : ''}" onclick="toggleChip(${p},'buy')">${p.toLocaleString()}G</span>`
    ).join('');
  document.getElementById('chipRowSell').innerHTML =
    '<span class="chip-label">売値:</span>' +
    sellPrices.map(p =>
      `<span class="price-chip sell${selectedSellPrices.has(p) ? ' active sell' : ''}" onclick="toggleChip(${p},'sell')">${p.toLocaleString()}G</span>`
    ).join('');
}

function statusIcon(s) { return s === 'identified' ? '✓' : s === 'absent' ? '✕' : '?'; }
function statusLabel(s) {
  if (s === 'identified') return '識別済み → なし にする';
  if (s === 'absent') return 'なし → 未識別 にする';
  return '未識別 → 識別済み にする';
}

function render() {
  const items = ITEMS[currentTab];

  // Update all badges
  Object.keys(ITEMS).forEach(cat => {
    const cnt = Object.values(state[cat]).filter(v => v === 'identified').length;
    document.getElementById('badge-' + cat).textContent = cnt + '/' + ITEMS[cat].length;
  });

  // Apply count filter first
  let filtered = items;
  if (countFilter !== null && hasCountItems()) {
    filtered = filtered.filter(it => it.counts && it.counts.includes(countFilter));
  }

  // Apply price filter
  if (priceFilter !== null && !isNaN(priceFilter)) {
    filtered = filtered.filter(it => {
      if (it.counts) {
        const relevant = countFilter ? [countFilter] : it.counts;
        return relevant.some(c => getBuy(it, c) === priceFilter || getSell(it, c) === priceFilter);
      }
      return it.buy === priceFilter || it.sell === priceFilter;
    });
  } else if (selectedPrices.size > 0 || selectedSellPrices.size > 0) {
    filtered = filtered.filter(it => {
      if (it.counts) {
        const relevant = countFilter ? [countFilter] : it.counts;
        return relevant.some(c =>
          (selectedPrices.size > 0 && selectedPrices.has(getBuy(it, c))) ||
          (selectedSellPrices.size > 0 && selectedSellPrices.has(getSell(it, c)))
        );
      }
      return (selectedPrices.size > 0 && selectedPrices.has(it.buy)) ||
             (selectedSellPrices.size > 0 && selectedSellPrices.has(it.sell));
    });
  }

  // Sort
  filtered = [...filtered].sort((a, b) => {
    const order = { unknown: 0, identified: 1, absent: 2 };
    return order[getStatus(currentTab, a.name)] - order[getStatus(currentTab, b.name)];
  });

  // Stats
  const total = items.length;
  const identified = items.filter(it => getStatus(currentTab, it.name) === 'identified').length;
  const absent = items.filter(it => getStatus(currentTab, it.name) === 'absent').length;
  const unknown = total - identified - absent;
  document.getElementById('statsBar').innerHTML = `
    <div class="stat"><span class="stat-val accent">${unknown}</span> 未識別</div>
    <div class="stat"><span class="stat-val green">${identified}</span> 識別済み</div>
    <div class="stat"><span class="stat-val gray">${absent}</span> なし</div>
    <div class="stat" style="margin-left:auto; color: var(--text2)">全${total}種</div>
  `;

  // Filter count label
  const anyFilter = (priceFilter !== null && !isNaN(priceFilter)) ||
                    selectedPrices.size > 0 || selectedSellPrices.size > 0 || countFilter !== null;
  document.getElementById('filterCount').textContent = anyFilter ? `${filtered.length}件該当` : '';

  // Render items
  const list = document.getElementById('itemList');
  const noResults = document.getElementById('noResults');

  if (filtered.length === 0) {
    list.innerHTML = '';
    noResults.style.display = 'block';
    return;
  }
  noResults.style.display = 'none';

  list.innerHTML = filtered.map(item => {
    const status = getStatus(currentTab, item.name);

    // Price display
    let priceHtml;
    if (item.counts) {
      if (countFilter !== null && item.counts.includes(countFilter)) {
        const b = getBuy(item, countFilter);
        const s = getSell(item, countFilter);
        priceHtml = `<div class="price-buy">${b.toLocaleString()}G</div><div class="price-sell">売: ${s.toLocaleString()}G</div>`;
      } else {
        const minB = getMinBuy(item);
        const maxB = getMaxBuy(item);
        const minS = getSell(item, item.counts[0]);
        const maxS = getSell(item, item.counts[item.counts.length - 1]);
        if (minB === maxB) {
          priceHtml = `<div class="price-buy">${minB.toLocaleString()}G</div><div class="price-sell">売: ${minS.toLocaleString()}G</div>`;
        } else {
          priceHtml = `<div class="price-buy">${minB.toLocaleString()}〜${maxB.toLocaleString()}G</div><div class="price-sell">売: ${minS.toLocaleString()}〜${maxS.toLocaleString()}G</div>`;
        }
      }
    } else {
      priceHtml = `<div class="price-buy">${item.buy.toLocaleString()}G</div><div class="price-sell">売: ${item.sell.toLocaleString()}G</div>`;
    }

    // Count badges
    let countHtml = '';
    if (item.counts) {
      const unit = currentTab === 'staff' ? '回' : '個';
      countHtml = `<div class="item-counts">${
        item.counts.map(c =>
          `<span class="count-badge${countFilter === c ? ' match' : ''}">${c}${unit}</span>`
        ).join('')
      }</div>`;
    }

    // Highlight if matches active price filter
    const isHighlighted = (() => {
      if (!anyFilter) return false;
      if (item.counts) {
        const relevant = countFilter ? item.counts.filter(c => c === countFilter) : item.counts;
        if (priceFilter !== null) return relevant.some(c => getBuy(item, c) === priceFilter || getSell(item, c) === priceFilter);
        if (selectedPrices.size > 0 || selectedSellPrices.size > 0)
          return relevant.some(c => selectedPrices.has(getBuy(item, c)) || selectedSellPrices.has(getSell(item, c)));
        return countFilter !== null;
      }
      if (priceFilter !== null) return item.buy === priceFilter || item.sell === priceFilter;
      return selectedPrices.has(item.buy) || selectedSellPrices.has(item.sell);
    })();

    return `
      <div class="item-card ${status === 'identified' ? 'identified' : status === 'absent' ? 'absent' : ''} ${isHighlighted ? 'highlighted' : ''}">
        <div class="item-info">
          <div class="item-name">${item.name}${item.target ? '<span class="target-badge">どれ</span>' : ''}</div>
          <div class="item-effect">${item.effect}</div>
          ${countHtml}
        </div>
        <div class="item-price">${priceHtml}</div>
        <div class="item-status-col">
          <button class="status-btn s-${status}" onclick="cycleStatus('${currentTab}', '${item.name.replace(/'/g, "\\'")}')">
            ${statusIcon(status)}
            <span class="tooltip">${statusLabel(status)}</span>
          </button>
        </div>
      </div>
    `;
  }).join('');
}

renderChips();
render();

let qrGenerated = false;
function showQR() {
  const isLocalhost = location.hostname === 'localhost' || location.hostname === '127.0.0.1';
  const url = window.location.href;
  const qrUrl = isLocalhost
    ? url.replace(/^(https?:\/\/)(localhost|127\.0\.0\.1)/, '$1' + (window._localIP || location.hostname))
    : url;
  const displayNote = isLocalhost
    ? url + '\n⚠ 他デバイス用: localhostをMacのIPに変えてください'
    : url;
  document.getElementById('qrUrl').textContent = displayNote;
  if (!qrGenerated) {
    new QRCode(document.getElementById('qrcode'), {
      text: qrUrl,
      width: 180,
      height: 180,
      colorDark: '#000000',
      colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.M,
    });
    qrGenerated = true;
  }
  document.getElementById('qrModal').classList.add('open');
}
function closeQR() {
  document.getElementById('qrModal').classList.remove('open');
}
